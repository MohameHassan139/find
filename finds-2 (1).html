<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فايند — finds.sa</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F4F4;--card:#FFFFFF;--text:#000;--sec:#6C6C6C;--accent:#F5C518;
  --tint:#FFF4CC;--field:#F2F2F7;--inactive:#ADADAD;--shad:rgba(0,0,0,.09);
  --bdr:rgba(0,0,0,.12);--offer:#34C759;--req:#FF9500;--del:#FF3B30;
  --font:'Tajawal',sans-serif;--mono:'IBM Plex Mono',monospace;--tr:.22s cubic-bezier(.4,0,.2,1)
}
[data-theme=dark]{
  --bg:#1E1E1E;--card:#2C2C2E;--text:#FFF;--sec:#ADADAD;
  --tint:rgba(255,244,204,.2);--field:#3A3A3C;--shad:rgba(0,0,0,.45);--bdr:rgba(255,255,255,.12)
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:#666;color:var(--text);font-size:16px}
button{cursor:pointer;font-family:var(--font);border:none;background:none;color:var(--text)}
img{display:block;max-width:100%}

/* ── App shell ── */
#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:var(--bg);position:relative;box-shadow:0 0 60px rgba(0,0,0,.25);overflow:hidden}
@media(min-width:431px){#app{border-inline:1px solid var(--bdr)}}

/* ── Header ── */
.hdr{background:var(--card);padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.logo{font-size:26px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--text) 40%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%}
.logo-area{display:flex;align-items:center;gap:6px;margin-inline-start:auto}
.hbtn{width:44px;height:44px;border-radius:50%;border:2px solid var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:transparent;transition:background var(--tr)}
.hbtn:hover{background:var(--field)}
.ham{display:flex;flex-direction:column;gap:5px}.ham span{width:20px;height:2.5px;background:var(--text);border-radius:2px;display:block}

/* ── Search ── */
.search-bar{background:var(--card);padding:8px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.search-inner{display:flex;align-items:center;gap:8px;background:var(--field);border-radius:10px;padding:10px 12px}
.search-inp{flex:1;border:none;background:transparent;font-family:var(--font);font-size:16px;color:var(--text);outline:none;text-align:right}
.search-inp::placeholder{color:var(--inactive)}
.tags-bar{display:flex;gap:8px;padding:6px 12px;background:var(--card);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tags-bar::-webkit-scrollbar{display:none}
.tag-pill{display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--tint);border:1px solid rgba(245,197,24,.5);border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0}
.tag-x{background:none;border:none;color:var(--sec);font-size:13px;cursor:pointer}

/* ── Top tabs ── */
.top-tabs{background:var(--tint);display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bdr);flex-shrink:0}
.top-tabs::-webkit-scrollbar{display:none}
.ttab{flex-shrink:0;padding:8px 14px;white-space:nowrap;font-size:16px;font-weight:400;color:var(--text);border-bottom:3px solid transparent;background:none;transition:all var(--tr)}
.ttab.active{font-size:20px;font-weight:900;border-bottom-color:var(--accent)}

/* ── Main content ── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen{display:none;flex-direction:column;min-height:100%;padding-bottom:110px}
.screen.active{display:flex;animation:fadeUp .22s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── Bottom nav ── */
.bnav{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);width:calc(100% - 100px);background:var(--card);border-radius:50px;padding:12px 24px;box-shadow:0 4px 30px var(--shad);display:flex;gap:0;align-items:center;z-index:200;flex-shrink:0}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;opacity:.35;transition:opacity var(--tr);position:relative}
.ni.active{opacity:1}.ni:hover{opacity:.75}
.ni-icon{font-size:26px}.ni-lbl{font-size:10px;font-weight:500}
.nbadge{position:absolute;top:-4px;right:0;min-width:18px;height:18px;background:red;color:#fff;border-radius:9px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* ── Category grid ── */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:12px}
.cat-card{background:var(--card);border-radius:16px;box-shadow:0 4px 16px var(--shad);height:120px;display:flex;flex-direction:column;align-items:center;overflow:hidden;cursor:pointer;transition:transform var(--tr),box-shadow var(--tr)}
.cat-card:hover{transform:translateY(-2px)}.cat-card:active{transform:scale(.97)}
.cat-icon-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:14px 10px 4px;width:100%}
.cat-icon-slot{width:30px;height:30px;border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center;border:.5px solid rgba(0,0,0,.08)}
.cat-icon-slot img{width:20px;height:20px;object-fit:contain}
.cat-name{font-size:12px;font-weight:500;text-align:center;line-height:1.3;padding:0 6px 10px;margin-top:auto}

/* ── Listing card ── */
.lcard{background:var(--card);border-radius:14px;box-shadow:0 2px 12px var(--shad);display:flex;height:180px;overflow:hidden;cursor:pointer;transition:transform var(--tr),box-shadow var(--tr);margin:0 10px}
.lcard:hover{transform:translateY(-2px)}.lcard:active{transform:scale(.98)}
.lcard-info{flex:1;display:flex;flex-direction:column;padding:10px;min-width:0}
.lcard-title{font-size:14px;font-weight:700;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;text-align:right}
.lcard-div{height:1px;background:var(--bdr);margin:6px 0}
.lcard-seller{display:flex;align-items:center;gap:6px;margin-top:auto}
.lcard-price{display:flex;align-items:center;gap:3px;margin-right:auto}
.lcard-meta{display:flex;align-items:center;justify-content:space-between}
.lcard-img{width:155px;flex-shrink:0;position:relative;overflow:hidden;border-radius:14px 0 0 14px}
[dir=rtl] .lcard-img{border-radius:0 14px 14px 0}
.lcard-img img{width:100%;height:100%;object-fit:cover}
.lcard-ph{width:100%;height:100%;background:var(--field);display:flex;align-items:center;justify-content:center;font-size:36px}
.type-badge{position:absolute;bottom:8px;left:8px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;color:#fff}
.b-offer{background:var(--offer)}.b-req{background:var(--req)}
.fav{position:absolute;top:8px;left:8px;width:34px;height:34px;background:rgba(255,255,255,.85);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;backdrop-filter:blur(4px);transition:transform .15s}
.fav:hover{transform:scale(1.1)}
.avatar{border-radius:50%;object-fit:cover;background:var(--field);flex-shrink:0}
.llist{display:flex;flex-direction:column;gap:10px}

/* ── Sub-tabs ── */
.stabs{display:flex;overflow-x:auto;scrollbar-width:none;background:var(--tint);border-bottom:1px solid var(--bdr)}
.stabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:8px 14px;font-size:14px;font-weight:400;white-space:nowrap;border-bottom:3px solid transparent;cursor:pointer;background:none;transition:all var(--tr)}
.stab.active{font-weight:700;border-bottom-color:var(--accent)}

/* ── Filter bar ── */
.fbar{display:flex;gap:8px;padding:10px;background:var(--tint);border-bottom:1px solid var(--bdr);flex-wrap:wrap;align-items:center}
.chip{padding:6px 14px;border-radius:20px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;background:var(--card);border:1.5px solid var(--bdr);transition:all var(--tr)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.chip:hover:not(.active){background:var(--field)}
.selw{position:relative}
.sel{appearance:none;padding:7px 28px 7px 10px;border-radius:10px;background:var(--card);border:1.5px solid var(--bdr);font-family:var(--font);font-size:14px;color:var(--text);cursor:pointer;outline:none}
.selarr{position:absolute;left:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--sec);font-size:10px}

/* ── Spinner / empty ── */
.spin-wrap{display:flex;justify-content:center;padding:48px}
.spin{width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px 20px;color:var(--sec)}
.empty-icon{font-size:52px;color:var(--inactive)}

/* ── Listing detail ── */
.dtitle{font-size:20px;font-weight:700;padding:16px 16px 12px;text-align:right}
.dmeta{display:flex;gap:16px;padding:10px 16px;border-bottom:1px solid var(--bdr);flex-wrap:wrap}
.act-bar{display:flex;align-items:stretch;background:#fff;border-bottom:1px solid var(--bdr);flex-shrink:0}
.ch-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 12px;font-size:11px;font-weight:500;cursor:pointer;transition:background var(--tr);border:none;background:transparent;font-family:var(--font)}
.ch-btn:hover{background:var(--field)}.ch-btn.dis{color:var(--inactive);cursor:default}
.ch-icon{font-size:22px}
.actdiv{width:1px;background:var(--bdr)}
.navarrows{display:flex;align-items:center;padding:0 12px;gap:10px}
.narr{font-size:22px;font-weight:700;padding:8px;opacity:.2;cursor:default;background:none;border:none;font-family:var(--font)}
.narr.on{opacity:1;cursor:pointer}.narr.on:hover{opacity:.7}

/* ── Menu ── */
.menu-wrap{padding-bottom:110px}
.menu-login{margin:10px;padding:20px;background:var(--card);border-radius:10px;box-shadow:0 4px 16px var(--shad);text-align:center;font-size:16px;font-weight:600;color:#007AFF;cursor:pointer}
.mrow{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);margin:4px 8px;border-radius:10px;cursor:pointer;box-shadow:0 2px 8px var(--shad);transition:background var(--tr)}
.mrow:hover{background:var(--field)}
.micon{width:43px;height:38px;border-radius:8px;background:var(--tint);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.mlabel{font-size:16px;font-weight:500;flex:1}
.mchev{color:var(--sec);font-size:16px}

/* ── Settings rows ── */
.srow{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);cursor:pointer;transition:background var(--tr)}
.srow:hover{background:var(--field)}
.sibox{width:43px;height:38px;border-radius:8px;background:var(--tint);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.srow-label{font-size:16px;font-weight:500;flex:1}
.srow-style{border-radius:10px;margin:4px 8px;box-shadow:0 2px 8px var(--shad);overflow:hidden}

/* ── Add Ad form ── */
.addad-wrap{padding:10px;background:var(--bg)}
.addad-card{background:var(--card);border-radius:12px;box-shadow:0 4px 16px var(--shad);overflow:hidden;margin-bottom:10px}
.addad-header{font-size:18px;font-weight:600;padding:14px;text-align:center;background:var(--tint)}
.form-section{padding:14px}
.flbl{font-size:14px;font-weight:600;color:var(--sec);margin-bottom:6px;display:block}
.finp,.fta{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--bdr);background:var(--field);font-family:var(--font);font-size:16px;color:var(--text);outline:none;transition:border-color var(--tr);text-align:right}
.finp:focus,.fta:focus{border-color:var(--accent)}
.fta{resize:none;height:100px}
.picker-row{width:100%;padding:14px;border-radius:10px;border:1.5px solid var(--bdr);background:var(--field);font-family:var(--font);font-size:16px;color:var(--sec);text-align:right;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color var(--tr)}
.picker-row:hover{border-color:var(--accent)}
.picker-row.filled{color:var(--text);border-color:var(--accent)}
.type-toggle{display:flex;gap:10px}
.type-btn{flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--bdr);font-family:var(--font);font-size:15px;font-weight:500;cursor:pointer;background:var(--field);color:var(--sec);transition:all var(--tr)}
.type-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.thumb-row{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding:2px 0}
.thumb-row::-webkit-scrollbar{display:none}
.thumb{width:100px;height:100px;border-radius:10px;object-fit:cover;flex-shrink:0}
.thumb-ph{width:100px;height:100px;border-radius:10px;background:var(--field);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;border:1.5px dashed var(--inactive)}
.thumb-add{width:100px;height:100px;border-radius:10px;background:var(--field);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;flex-shrink:0;cursor:pointer;border:1.5px dashed var(--inactive)}
.thumb-del{position:absolute;top:4px;right:4px;background:red;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:none;font-family:var(--font)}
.thumb-wrap{position:relative;flex-shrink:0}
.pub-btn{width:100%;padding:16px;border-radius:12px;background:var(--accent);font-family:var(--font);font-size:17px;font-weight:700;color:#000;cursor:pointer;border:none;transition:opacity var(--tr)}
.pub-btn:hover{opacity:.85}.pub-btn:disabled{opacity:.4;cursor:default}
.req-star{color:red;margin-inline-end:2px}

/* ── Auth ── */
.auth-wrap{padding:16px}
.auth-banner{padding:18px;background:var(--tint);border-radius:12px;text-align:center;font-size:18px;font-weight:600;margin-bottom:16px}
.phone-row{display:flex;gap:10px}
.cc-inp{width:72px;padding:14px 8px;text-align:center;border-radius:10px;border:1.5px solid var(--bdr);background:var(--field);font-family:var(--font);font-size:16px;font-weight:600;color:var(--text);outline:none}
.cc-inp:focus{border-color:var(--accent)}
.auth-btn{width:100%;padding:20px;border-radius:10px;background:var(--card);font-family:var(--font);font-size:16px;font-weight:500;color:#007AFF;margin-top:14px;border:none;cursor:pointer;transition:background var(--tr);box-shadow:0 2px 8px var(--shad)}
.auth-btn:hover{background:var(--field)}
.otp-inp{width:100%;padding:16px;text-align:center;letter-spacing:10px;font-size:22px;font-weight:700;border-radius:10px;border:1.5px solid var(--accent);background:var(--field);font-family:var(--mono);color:var(--text);outline:none;margin-top:14px}
.resend-btn{background:none;border:none;font-family:var(--font);font-size:14px;color:var(--accent);cursor:pointer;padding:10px;width:100%;text-align:center;display:block}

/* ── Profile ── */
.p-avatar{width:100px;height:100px;border-radius:20px;background:var(--field);display:flex;align-items:center;justify-content:center;font-size:52px;overflow:hidden;margin:20px auto}
.p-avatar img{width:100%;height:100%;object-fit:cover;border-radius:20px}
.pfields{background:var(--card);border-radius:14px;padding:0 16px;box-shadow:0 2px 8px var(--shad);margin:0 16px}
.prow{display:flex;align-items:center;gap:10px;padding:13px 0}
.prow+.prow{border-top:1px solid var(--bdr)}
.pinp{flex:1;border:none;background:transparent;font-family:var(--font);font-size:15px;color:var(--text);text-align:right;outline:none;padding:4px 0}
.pinp:disabled{color:var(--sec)}
.update-btn{width:calc(100% - 32px);margin:14px 16px 0;padding:14px;border-radius:12px;background:var(--accent);font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;border:none;color:#000}
.signout-btn{width:calc(100% - 32px);margin:10px 16px 0;padding:14px;border-radius:12px;background:rgba(255,59,48,.08);color:#FF3B30;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;border:none}
.del-btn{width:calc(100% - 32px);margin:10px 16px 0;padding:14px;border-radius:12px;background:#FF3B30;color:#fff;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;border:none}

/* ── Settings ── */
.settings-wrap{padding-bottom:110px}
.toggle-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card)}
.ios-toggle{position:relative;width:51px;height:31px;flex-shrink:0}
.ios-toggle input{opacity:0;width:0;height:0}
.ios-slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:31px;transition:.3s}
.ios-slider:before{content:'';position:absolute;width:27px;height:27px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
input:checked+.ios-slider{background:var(--accent)}
input:checked+.ios-slider:before{transform:translateX(20px)}
.lang-btn{width:100%;padding:14px;border-radius:10px;border:1.5px solid var(--bdr);background:var(--field);font-family:var(--font);font-size:16px;font-weight:500;cursor:pointer;color:var(--text);transition:border-color var(--tr)}
.lang-btn.active{border-color:var(--accent);border-width:2px}
.del-account-btn{width:calc(100% - 16px);margin:0 8px;padding:16px;border-radius:10px;background:#FF3B30;font-family:var(--font);font-size:17px;font-weight:700;color:#fff;cursor:pointer;border:none}
.ch-row{display:flex;align-items:center;gap:16px;padding:14px 16px;border-top:1px solid var(--bdr)}
.checkbox{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.checkbox.locked{opacity:.35;cursor:default}

/* ── Notifications ── */
.notif-row{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid var(--bdr)}
.ndot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.notif-body{flex:1;text-align:right}

/* ── Chats ── */
.conv-row{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--bdr);transition:background var(--tr)}
.conv-row:hover{background:var(--field)}
.unread-pill{background:red;color:#fff;font-size:10px;font-weight:700;border-radius:12px;padding:2px 7px;white-space:nowrap}

/* ── Picker sheets ── */
.picker-sheet{position:absolute;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:500}
.picker-sheet.open{display:flex;animation:fadeUp .22s ease}
.picker-header{background:var(--tint);padding:14px 16px;font-size:17px;font-weight:700;text-align:center;cursor:pointer;border-bottom:1px solid var(--bdr)}
.picker-scroll{flex:1;overflow-y:auto;padding:14px}
.prow-btn{width:100%;display:flex;align-items:center;gap:12px;padding:0 14px;height:60px;background:var(--card);border-radius:12px;border:none;font-family:var(--font);font-size:16px;color:var(--text);cursor:pointer;margin-bottom:10px;box-shadow:0 2px 8px var(--shad);transition:border-color var(--tr)}
.prow-btn:hover{border:1.5px solid var(--accent)}
.prow-btn.selected{border:1.5px solid var(--accent);font-weight:600;background:var(--tint)}

/* ── Upload overlay ── */
.upload-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:900}
.upload-overlay.open{display:flex}
.upload-card{background:var(--card);border-radius:20px;padding:32px;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 8px 40px rgba(0,0,0,.3)}

/* ── Toast ── */
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.theme-btn{position:fixed;top:14px;left:14px;z-index:9999;background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:6px 12px;font-size:12px;cursor:pointer;box-shadow:0 2px 8px var(--shad)}
</style>
</head>
<body>
<button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙 داكن</button>
<div id="app">

<!-- HEADER -->
<div class="hdr">
  <button class="hbtn" id="backBtn" onclick="goBack()" style="display:none">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="hbtn" onclick="navigateBottom('menu')"><div class="ham"><span></span><span></span><span></span></div></button>
  <div class="logo-area"><div class="logo">فايند</div><div class="logo-dot"></div></div>
</div>

<!-- SEARCH -->
<div class="search-bar" id="searchBarWrap">
  <div class="search-inner">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;opacity:.6"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-inp" id="searchInput" type="text" placeholder="ابحث عن أي شيء..." oninput="onSearchInput(this.value)" onkeydown="if(event.key==='Enter')submitSearch()">
    <button id="srchClear" onclick="clearSearch()" style="display:none;color:var(--inactive);font-size:17px;padding:2px">✕</button>
  </div>
</div>
<div class="tags-bar" id="tagsBar" style="display:none"></div>

<!-- TOP TABS -->
<div class="top-tabs" id="topTabBar"></div>

<!-- MAIN CONTENT -->
<div class="main" id="mainContent">
  <div class="screen active" id="sc-home"><div id="homeContent"></div></div>
  <div class="screen" id="sc-category"><div id="catContent"></div></div>
  <div class="screen" id="sc-listing" style="background:var(--card)"><div id="listingContent"></div></div>
  <div class="screen" id="sc-search"><div class="llist" id="searchList" style="padding:10px 0"></div></div>
  <div class="screen" id="sc-addad"><div id="addAdContent"></div></div>
  <div class="screen" id="sc-chats"><div id="chatsContent"></div></div>
  <div class="screen" id="sc-menu"><div class="menu-wrap" id="menuContent"></div></div>
  <div class="screen" id="sc-auth"><div id="authContent"></div></div>
  <div class="screen" id="sc-profile"><div id="profileContent"></div></div>
  <div class="screen" id="sc-notifications"><div id="notifContent" style="background:var(--card)"></div></div>
  <div class="screen" id="sc-myads"><div class="llist" id="myAdsContent" style="padding:10px"></div></div>
  <div class="screen" id="sc-favorites"><div class="llist" id="favContent" style="padding:10px 0"></div></div>
  <div class="screen" id="sc-settings"><div class="settings-wrap" id="settingsContent"></div></div>
  <div class="screen" id="sc-language"><div id="langContent" style="padding:16px"></div></div>
  <div class="screen" id="sc-channels"><div id="channelsContent" style="padding:16px"></div></div>
</div>

<!-- CATEGORY/LOCATION PICKERS (sheets inside add-ad) -->
<div class="picker-sheet" id="catPicker">
  <div class="picker-header" onclick="closePicker('cat')">← إضافة إعلان</div>
  <div class="picker-scroll" id="catPickerContent"></div>
</div>
<div class="picker-sheet" id="locPicker">
  <div class="picker-header" onclick="closePicker('loc')">← إضافة إعلان</div>
  <div class="picker-scroll" id="locPickerContent"></div>
</div>

<!-- UPLOAD OVERLAY -->
<div class="upload-overlay" id="uploadOverlay">
  <div class="upload-card">
    <div class="spin"></div>
    <div style="font-size:16px;font-weight:600">جارٍ رفع الصور</div>
    <div id="uploadProgress" style="font-size:14px;color:var(--sec)">0 / 0</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <div class="ni active" id="ni-home" onclick="navigateBottom('home')"><div class="ni-icon">🏠</div><div class="ni-lbl">الرئيسية</div></div>
  <div class="ni" id="ni-addad" onclick="navigateBottom('addad')"><div class="ni-icon">➕</div><div class="ni-lbl">إضافة</div></div>
  <div class="ni" id="ni-chats" onclick="navigateBottom('chats')"><div class="ni-icon">💬</div><div class="ni-lbl">المحادثات</div><div class="nbadge" id="chatBadge" style="display:none">0</div></div>
  <div class="ni" id="ni-menu" onclick="navigateBottom('menu')"><div class="ni-icon">☰</div><div class="ni-lbl">القائمة</div></div>
</nav>
</div>
<div class="toast" id="toast"></div>

<script>
/* ═══════════ CONSTANTS ═══════════ */
const API='http://api.finds.sa/api';
const ICONS='https://ocebfvgwgpebjxetnixc.supabase.co/storage/v1/object/public/listings-images/subCatigory/';

/* ═══════════ STATE ═══════════ */
const S={
  cats:[],regions:[],cities:[],
  listings:[],searchRes:[],myAds:[],
  token:localStorage.getItem('auth_token'),
  user:JSON.parse(localStorage.getItem('auth_user')||'null'),
  favs:new Set(JSON.parse(localStorage.getItem('favorites_v3')||'[]')),
  convs:[],notifs:[],
  tab:'home',topTab:0,
  selListing:null,ctx:[],ctxIdx:0,
  srchTags:[],srchDraft:'',debounce:null,
  catIdx:null,catSubIdx:null,catExtraIdx:null,
  catRegId:null,catCityId:null,catType:null,
  isDark:localStorage.getItem('theme')==='dark',
  // add ad state
  adTitle:'',adDesc:'',adPrice:'',adType:'offer',
  adCat:null,adSub:null,adFilter:null,
  adRegion:null,adCity:null,
  adImages:[],adExistingUrls:[],
  adEditingId:null,
  catPickerStep:'cat',locPickerStep:'region',
  // contact channels
  chWhatsapp:false,chCall:false,
  // theme/lang
  lang:'ar',
};
if(S.isDark) document.documentElement.setAttribute('data-theme','dark');
if(S.user){S.chWhatsapp=S.user.whatsapp_enabled||false;S.chCall=S.user.call_enabled||false;}

/* ═══════════ API ═══════════ */
async function api(path,opts={}){
  const h={'Content-Type':'application/json','Accept':'application/json'};
  if(S.token) h['Authorization']='Bearer '+S.token;
  const r=await fetch(API+path,{headers:h,...opts});
  const d=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(d.message||'HTTP '+r.status);
  return d;
}

/* ═══════════ BOOTSTRAP ═══════════ */
async function boot(){
  renderMenu();renderAddAd();renderAuth();renderProfile();renderSettings();renderLang();renderChannels();
  try{
    const d=await api('/search-filters');
    const data=d.data||d;
    S.cats=data.categories||[];
    S.regions=data.regions||[];
    S.cities=(data.regions||[]).flatMap(r=>(r.cities||[]).map(c=>({...c,regionId:r.id})));
    buildTopTabs();renderHome();
  }catch(e){toast('تعذّر تحميل البيانات');renderHome();}
  if(S.token){try{await restoreSession();}catch(_){}}
}

async function restoreSession(){
  const d=await api('/auth/me');
  S.user=d.user;localStorage.setItem('auth_user',JSON.stringify(S.user));
  S.chWhatsapp=S.user.whatsapp_enabled||false;S.chCall=S.user.call_enabled||false;
  renderMenu();renderProfile();renderChannels();
}

/* ═══════════ ROUTER ═══════════ */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');});
  const el=document.getElementById('sc-'+id);
  if(el){el.classList.add('active');}
}

function navigateBottom(tab){
  S.tab=tab;S.selListing=null;
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  const ni=document.getElementById('ni-'+tab);if(ni)ni.classList.add('active');
  const isHome=tab==='home';
  document.getElementById('searchBarWrap').style.display=isHome?'':'none';
  document.getElementById('topTabBar').style.display=isHome?'':'none';
  document.getElementById('backBtn').style.display='none';
  clearSearchUI(false);
  if(tab==='home'){show('home');buildTopTabs();}
  else if(tab==='addad'){
    if(!S.token){navigateBottom('menu');navMenu('auth');return;}
    S.adTitle='';S.adDesc='';S.adPrice='';S.adType='offer';
    S.adCat=null;S.adSub=null;S.adFilter=null;S.adRegion=null;S.adCity=null;
    S.adImages=[];S.adExistingUrls=[];S.adEditingId=null;
    renderAddAd();show('addad');
  }
  else if(tab==='chats'){show('chats');loadConvs();}
  else if(tab==='menu'){show('menu');renderMenu();}
}

function navigateTop(idx){
  S.topTab=idx;S.selListing=null;
  document.querySelectorAll('.ttab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.getElementById('backBtn').style.display='none';
  clearSearchUI(false);
  if(idx===0){show('home');}
  else{
    S.catIdx=idx;S.catSubIdx=null;S.catExtraIdx=null;S.catRegId=null;S.catCityId=null;S.catType=null;
    show('category');renderCat(idx);
  }
}

function openListing(listing,ctx=[]){
  S.selListing=listing;S.ctx=ctx;S.ctxIdx=ctx.findIndex(l=>l.id===listing.id);
  if(S.ctxIdx<0)S.ctxIdx=0;
  document.getElementById('backBtn').style.display='';
  document.getElementById('searchBarWrap').style.display='none';
  document.getElementById('topTabBar').style.display='none';
  show('listing');renderListing();
}

function goBack(){
  if(S.selListing){
    S.selListing=null;
    document.getElementById('backBtn').style.display='none';
    document.getElementById('searchBarWrap').style.display=S.tab==='home'?'':'none';
    if(S.tab==='home')document.getElementById('topTabBar').style.display='';
    if(S.topTab===0)show('home');else show('category');
    return;
  }
  document.getElementById('backBtn').style.display='none';
  show('menu');renderMenu();
}

function navMenu(tab){
  document.getElementById('backBtn').style.display='';
  document.getElementById('searchBarWrap').style.display='none';
  document.getElementById('topTabBar').style.display='none';
  if(tab==='auth'){show('auth');renderAuth();}
  else if(tab==='profile'){show('profile');renderProfile();}
  else if(tab==='notifications'){show('notifications');loadNotifs();}
  else if(tab==='myads'){show('myads');loadMyAds();}
  else if(tab==='favorites'){show('favorites');loadFavs();}
  else if(tab==='settings'){show('settings');renderSettings();}
  else if(tab==='language'){show('language');renderLang();}
  else if(tab==='channels'){show('channels');renderChannels();}
}

function editAd(listing){
  S.adEditingId=listing.id;S.adTitle=listing.title;S.adDesc=listing.description||'';
  S.adPrice=listing.price?String(Math.floor(listing.price)):'';S.adType=listing.listing_type||'offer';
  S.adExistingUrls=listing.images||[];S.adImages=[];
  if(listing.region_id){S.adRegion=S.regions.find(r=>r.id===listing.region_id)||null;}
  if(listing.region_id&&listing.city){S.adCity=S.cities.find(c=>c.regionId===listing.region_id&&(c.name_ar===listing.city||c.name_en===listing.city))||null;}
  if(listing.category_id){S.adCat=S.cats.find(c=>c.id===listing.category_id)||null;}
  if(listing.sub_category_id&&S.adCat){S.adSub=(S.adCat.sub_categories||[]).find(s=>s.id===listing.sub_category_id)||null;}
  navigateBottom('addad');renderAddAd();show('addad');
}

/* ═══════════ TOP TABS ═══════════ */
function buildTopTabs(){
  const bar=document.getElementById('topTabBar');
  bar.innerHTML=`<button class="ttab ${S.topTab===0?'active':''}" onclick="navigateTop(0)">الرئيسية</button>`;
  S.cats.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='ttab'+(S.topTab===i+1?' active':'');
    b.textContent=c.name_ar;b.onclick=()=>navigateTop(i+1);
    bar.appendChild(b);
  });
}

/* ═══════════ HOME ═══════════ */
function renderHome(){
  const el=document.getElementById('homeContent');
  if(!S.cats.length){el.innerHTML=`<div class="spin-wrap"><div class="spin"></div></div>`;return;}
  const g=document.createElement('div');g.className='cat-grid';
  S.cats.forEach((cat,i)=>{
    const c=document.createElement('div');c.className='cat-card';c.onclick=()=>navigateTop(i+1);
    const subs=cat.sub_categories||[];
    const icons=subs.slice(0,6).map(s=>s.icon).concat(Array(6).fill(null)).slice(0,6);
    if(!subs.length){
      c.innerHTML=`<div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:34px">🗂️</div><div class="cat-name">${cat.name_ar}</div>`;
    }else{
      let gr='<div class="cat-icon-grid">';
      icons.forEach(ic=>{
        if(ic){const fn=ic.includes('.')?ic:ic+'.png';gr+=`<div class="cat-icon-slot"><img src="${ICONS}${fn}" onerror="this.parentNode.style.opacity='0'"></div>`;}
        else gr+=`<div class="cat-icon-slot" style="opacity:0"></div>`;
      });
      gr+='</div>';
      c.innerHTML=gr+`<div class="cat-name">${cat.name_ar}</div>`;
    }
    g.appendChild(c);
  });
  el.innerHTML='';el.appendChild(g);
}

/* ═══════════ CATEGORY DETAIL ═══════════ */
async function renderCat(tabIdx){
  const el=document.getElementById('catContent');
  el.innerHTML=`<div class="spin-wrap"><div class="spin"></div></div>`;
  const cat=S.cats[tabIdx-1];if(!cat)return;
  const subs=cat.sub_categories||[];
  let html='';
  if(subs.length){
    html+=`<div class="stabs">`;
    subs.forEach((s,i)=>{html+=`<button class="stab ${S.catSubIdx===i?'active':''}" onclick="selSub(${i})">${s.name_ar}</button>`;});
    html+=`</div>`;
  }
  const ss=S.catSubIdx!==null?subs[S.catSubIdx]:null;
  const extras=ss?(ss.filter_options||[]):[];
  if(extras.length&&S.catSubIdx!==null){
    html+=`<div class="stabs">`;
    extras.forEach((e,i)=>{html+=`<button class="stab ${S.catExtraIdx===i?'active':''}" onclick="selExtra(${i})">${e.name_ar}</button>`;});
    html+=`</div>`;
  }
  const showFilters=(S.catSubIdx!==null||!subs.length)&&(!extras.length||S.catExtraIdx!==null);
  if(showFilters||!subs.length){
    html+=buildFBar();
    html+=`<div class="llist" id="catLlist" style="padding:10px 0"></div>`;
  }else if(S.catSubIdx===null){
    html+=buildSubGrid(subs);
  }else{
    html+=`<div class="llist" id="catLlist" style="padding:10px 0"></div>`;
  }
  el.innerHTML=html;
  if(showFilters||!subs.length||S.catSubIdx!==null)await fetchCatList(tabIdx);
}

function buildFBar(){
  const types=[{k:'all',l:'الكل'},{k:'offer',l:'عرض'},{k:'request',l:'طلب'}];
  let h=`<div class="fbar">`;
  h+=types.map(t=>`<button class="chip ${(!S.catType&&t.k==='all')||S.catType===t.k?'active':''}" onclick="selType('${t.k}')">${t.l}</button>`).join('');
  let ro=`<option value="">كل المناطق</option>`;
  S.regions.forEach(r=>{ro+=`<option value="${r.id}" ${S.catRegId===r.id?'selected':''}>${r.name_ar}</option>`;});
  h+=`<div class="selw"><select class="sel" onchange="selReg(this.value)">${ro}</select><span class="selarr">▾</span></div>`;
  if(S.catRegId){
    const rc=S.cities.filter(c=>c.regionId===S.catRegId);
    if(rc.length){
      let co=`<option value="">كل المدن</option>`;
      rc.forEach(c=>{co+=`<option value="${c.id}" ${S.catCityId===c.id?'selected':''}>${c.name_ar}</option>`;});
      h+=`<div class="selw"><select class="sel" onchange="selCity(this.value)">${co}</select><span class="selarr">▾</span></div>`;
    }
  }
  h+=`</div>`;return h;
}

function buildSubGrid(subs){
  let h=`<div class="cat-grid">`;
  subs.forEach((s,i)=>{
    const fn=s.icon?(s.icon.includes('.')?s.icon:s.icon+'.png'):null;
    h+=`<div class="cat-card" onclick="selSub(${i})">
      <div style="flex:1;display:flex;align-items:center;justify-content:center">${fn?`<img src="${ICONS}${fn}" style="width:52px;height:52px;object-fit:contain" onerror="this.outerHTML='<span style=font-size:34px>🗂️</span>'">`:`<span style="font-size:34px">🗂️</span>`}</div>
      <div class="cat-name">${s.name_ar}</div></div>`;
  });
  h+=`</div>`;return h;
}

async function fetchCatList(tabIdx){
  const el=document.getElementById('catLlist');if(!el)return;
  el.innerHTML=`<div class="spin-wrap"><div class="spin"></div></div>`;
  const cat=S.cats[tabIdx-1];if(!cat)return;
  const subs=cat.sub_categories||[];
  const ss=S.catSubIdx!==null?subs[S.catSubIdx]:null;
  const extras=ss?(ss.filter_options||[]):[];
  const se=S.catExtraIdx!==null?extras[S.catExtraIdx]:null;
  const p=new URLSearchParams({page:1,category_id:cat.id});
  if(ss)p.set('sub_category_id',ss.id);
  if(se)p.set('filter_option_id',se.id);
  if(S.catRegId)p.set('region_id',S.catRegId);
  if(S.catCityId){const c=S.cities.find(x=>x.id===S.catCityId);if(c)p.set('city',c.name_ar);}
  if(S.catType&&S.catType!=='all')p.set('listing_type',S.catType);
  try{
    const d=await api('/listings?'+p);
    S.listings=d.data||[];
    renderLlist(el,S.listings);
  }catch(e){el.innerHTML=`<div class="empty"><span class="empty-icon">⚠️</span><p>تعذّر التحميل</p></div>`;}
}

function selSub(i){S.catSubIdx=(S.catSubIdx===i)?null:i;S.catExtraIdx=null;S.catRegId=null;S.catCityId=null;renderCat(S.catIdx);}
function selExtra(i){S.catExtraIdx=(S.catExtraIdx===i)?null:i;renderCat(S.catIdx);}
function selType(t){S.catType=(t==='all')?null:t;fetchCatList(S.catIdx);document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));event.target.classList.add('active');}
function selReg(v){S.catRegId=v?parseInt(v):null;S.catCityId=null;renderCat(S.catIdx);}
function selCity(v){S.catCityId=v?parseInt(v):null;fetchCatList(S.catIdx);}

/* ═══════════ LISTING CARDS ═══════════ */
function renderLlist(container,listings,ctx){
  const context=ctx||listings;
  if(!listings.length){container.innerHTML=`<div class="empty"><span class="empty-icon">📭</span><p>لا توجد إعلانات</p></div>`;return;}
  container.innerHTML='';
  listings.forEach(l=>container.appendChild(buildCard(l,context)));
}

function buildCard(l,ctx=[]){
  const div=document.createElement('div');div.className='lcard';
  const imgs=l.images||[];const isFav=S.favs.has(l.id);
  div.innerHTML=`
    <div class="lcard-info">
      <div class="lcard-title">${l.title}</div>
      <div style="flex:1"></div>
      <div class="lcard-div"></div>
      <div class="lcard-seller">
        ${l.seller?.avatar?`<img class="avatar" src="${l.seller.avatar}" width="26" height="26" onerror="this.style.display='none'">`:`<div style="width:26px;height:26px;border-radius:50%;background:var(--field);flex-shrink:0"></div>`}
        <span style="font-size:11px;color:var(--sec);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70px">${l.seller?.name||''}</span>
        <div class="lcard-price"><span style="font-size:15px;font-weight:700">${fmt(l.price)}</span><span style="font-size:11px;color:var(--sec);margin-right:3px">${l.currency||'ر.س'}</span></div>
      </div>
      <div class="lcard-div"></div>
      <div class="lcard-meta">
        <span style="font-size:11px;color:var(--sec)">🕐 ${ago(l.created_at)}</span>
        <span style="font-size:11px;color:var(--sec)">📍 ${l.region?.name_ar||l.city||''}</span>
      </div>
    </div>
    <div class="lcard-img">
      ${imgs.length?`<img src="${imgs[0]}" alt="" onerror="this.style.display='none'">`:`<div class="lcard-ph">🖼️</div>`}
      <span class="type-badge ${l.listing_type==='offer'?'b-offer':'b-req'}">${l.listing_type==='offer'?'عرض':'طلب'}</span>
      <button class="fav" id="fav-${l.id}" onclick="event.stopPropagation();toggleFav('${l.id}',this)">${isFav?'❤️':'🤍'}</button>
    </div>`;
  div.onclick=()=>openListing(l,ctx.length?ctx:[l]);
  return div;
}

/* ═══════════ LISTING DETAIL ═══════════ */
function renderListing(){
  const el=document.getElementById('listingContent');
  const l=S.ctx[S.ctxIdx]||S.selListing;if(!l)return;
  const imgs=l.images||[];
  const canP=S.ctxIdx>0,canN=S.ctxIdx<S.ctx.length-1;
  const isOwn=S.user&&(S.user.id===l.user_id||S.user.id===l.seller?.id);
  el.innerHTML=`
    <div class="dtitle">${l.title}</div>
    <div class="dmeta">
      <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">
        ${l.seller?.avatar?`<img class="avatar" src="${l.seller.avatar}" width="40" height="40" onerror="this.style.display='none'">`:`<div style="width:40px;height:40px;border-radius:50%;background:var(--field)"></div>`}
        <span style="font-size:14px;font-weight:600">${l.seller?.name||'البائع'}</span>
        ${l.region?.name_ar||l.city?`<span style="font-size:12px;color:var(--sec)">📍 ${l.region?.name_ar||l.city}</span>`:''}
      </div>
      <div style="margin-right:auto;display:flex;flex-direction:column;gap:6px;padding-top:4px">
        ${l.price!=null?`<span style="font-size:18px;font-weight:700">${fmt(l.price)} ${l.currency||'ر.س'}</span>`:''}
        <span style="font-size:12px;color:var(--sec)">🕐 ${ago(l.created_at)}</span>
      </div>
    </div>
    <div class="act-bar">
      ${!isOwn?`
      <div style="display:flex;flex:1">
        <button class="ch-btn ${l.seller?.call_enabled?'':'dis'}" onclick="${l.seller?.call_enabled?`doCall('${l.seller?.phone||''}')`:''}"">
          <span class="ch-icon">📞</span><span>اتصال</span>
        </button>
        <button class="ch-btn ${l.seller?.whatsapp_enabled?'':'dis'}" onclick="${l.seller?.whatsapp_enabled?`doWA('${l.seller?.phone||''}')`:''}"">
          <span class="ch-icon">💬</span><span>واتساب</span>
        </button>
        <button class="ch-btn" onclick="startChat('${l.id}',${l.seller?.id||l.user_id||0})">

/* ═══════════ SEARCH ═══════════ */
function onSearchInput(v){
  S.srchDraft=v;document.getElementById('srchClear').style.display=v?'':'none';
  clearTimeout(S.debounce);
  if(!v.trim()&&!S.srchTags.length){clearSearchUI(false);return;}
  S.debounce=setTimeout(()=>runSearch(),400);
}
function submitSearch(){
  const t=S.srchDraft.trim();
  if(t&&!S.srchTags.includes(t))S.srchTags.push(t);
  S.srchDraft='';document.getElementById('searchInput').value='';
  updateTagsBar();runSearch();
}
function removeTag(tag){
  S.srchTags=S.srchTags.filter(t=>t!==tag);updateTagsBar();
  if(!S.srchTags.length&&!S.srchDraft)clearSearchUI(false);else runSearch();
}
function clearSearch(){S.srchDraft='';S.srchTags=[];document.getElementById('searchInput').value='';clearSearchUI(true);}
function clearSearchUI(ri=true){
  if(ri){S.srchDraft='';S.srchTags=[];document.getElementById('searchInput').value='';}
  document.getElementById('srchClear').style.display='none';
  document.getElementById('tagsBar').style.display='none';
  if(S.tab==='home'){if(S.topTab===0)show('home');else show('category');}
}
function updateTagsBar(){
  const el=document.getElementById('tagsBar');
  if(!S.srchTags.length){el.style.display='none';return;}
  el.style.display='';el.innerHTML=S.srchTags.map(t=>`<div class="tag-pill">${t}<button class="tag-x" onclick="removeTag('${t}')">✕</button></div>`).join('');
}
async function runSearch(){
  const parts=[...S.srchTags];if(S.srchDraft.trim())parts.push(S.srchDraft.trim());
  if(!parts.length){clearSearchUI(false);return;}
  show('search');
  const el=document.getElementById('searchList');
  el.innerHTML=`<div class="spin-wrap"><div class="spin"></div></div>`;
  updateTagsBar();
  try{
    const d=await api('/listings/search?q='+encodeURIComponent(parts.join(' '))+'&page=1');
    S.searchRes=d.data||[];el.innerHTML='';
    if(!S.searchRes.length){el.innerHTML=`<div class="empty"><span class="empty-icon">🔍</span><p>لا توجد نتائج</p></div>`;}
    else S.searchRes.forEach(l=>el.appendChild(buildCard(l,S.searchRes)));
  }catch(e){el.innerHTML=`<div class="empty"><span class="empty-icon">⚠️</span><p>خطأ في البحث</p></div>`;}
}

function updatePubBtn(){

function setAdType(t,btn){S.adType=t;document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

function addImages(input){
  const files=Array.from(input.files);
  files.forEach(f=>{
    const reader=new FileReader();
    reader.onload=e=>{S.adImages.push({url:e.target.result,file:f});renderAddAd();};
    reader.readAsDataURL(f);
  });
}
function removeExistingImg(i){S.adExistingUrls.splice(i,1);renderAddAd();}
function removeNewImg(i){S.adImages.splice(i,1);renderAddAd();}

async function submitAd(){
  if(!S.token){navMenu('auth');return;}
  if(!S.adTitle.trim()||!S.adCat||!S.adRegion){toast('أكمل الحقول المطلوبة');return;}
  const errEl=document.getElementById('adError');
  errEl.style.display='none';
  document.getElementById('pubBtn').disabled=true;
  const catId=S.adCat.id;
  const regionId=S.adRegion.id;
  const cityName=S.adCity?(S.lang==='ar'?S.adCity.name_ar:S.adCity.name_en):'';
  try{
    let listing;
    if(S.adEditingId){
      // upload new images first
      let newUrls=[];
      if(S.adImages.length){
        document.getElementById('uploadOverlay').classList.add('open');
        let done=0;
        for(const img of S.adImages){
          document.getElementById('uploadProgress').textContent=done+' / '+S.adImages.length;
          try{
            const fd=new FormData();fd.append('image',img.file);fd.append('listing_id',S.adEditingId);
            const r=await fetch(API+'/upload-image',{method:'POST',headers:{Authorization:'Bearer '+S.token,Accept:'application/json'},body:fd});
            const d=await r.json();if(d.url)newUrls.push(d.url);
          }catch(_){}
          done++;
        }
        document.getElementById('uploadOverlay').classList.remove('open');
      }
      const body={title:S.adTitle,description:S.adDesc,listing_type:S.adType,city:cityName,price:parseFloat(S.adPrice)||0,category_id:catId,region_id:regionId,images:[...S.adExistingUrls,...newUrls]};
      if(S.adSub)body.sub_category_id=S.adSub.id;if(S.adFilter)body.filter_option_id=S.adFilter.id;
      await api('/listings/'+S.adEditingId,{method:'PATCH',body:JSON.stringify(body)});
      toast('تم تحديث الإعلان ✓');
    }else{
      const body={title:S.adTitle,description:S.adDesc,listing_type:S.adType,city:cityName,price:parseFloat(S.adPrice)||0,category_id:catId,region_id:regionId,images:[]};
      if(S.adSub)body.sub_category_id=S.adSub.id;if(S.adFilter)body.filter_option_id=S.adFilter.id;
      const d=await api('/listings',{method:'POST',body:JSON.stringify(body)});
      listing=d.data;
      // upload images
      let urls=[];
      if(S.adImages.length&&listing){
        document.getElementById('uploadOverlay').classList.add('open');
        let done=0;
        for(const img of S.adImages){
          document.getElementById('uploadProgress').textContent=done+' / '+S.adImages.length;
          try{
            const fd=new FormData();fd.append('image',img.file);fd.append('listing_id',listing.id);
            const r=await fetch(API+'/upload-image',{method:'POST',headers:{Authorization:'Bearer '+S.token,Accept:'application/json'},body:fd});
            const data=await r.json();if(data.url)urls.push(data.url);
          }catch(_){}
          done++;
        }
        document.getElementById('uploadOverlay').classList.remove('open');
        if(urls.length){
          await api('/listings/'+listing.id,{method:'PATCH',body:JSON.stringify({...body,images:urls})});
        }
      }
      toast('تم نشر الإعلان ✓');
    }
    S.adTitle='';S.adDesc='';S.adPrice='';S.adType='offer';S.adCat=null;S.adSub=null;S.adFilter=null;S.adRegion=null;S.adCity=null;S.adImages=[];S.adExistingUrls=[];S.adEditingId=null;
    navigateBottom('home');
  }catch(e){
    document.getElementById('uploadOverlay').classList.remove('open');
    errEl.textContent=e.message||'خطأ في النشر';errEl.style.display='';
    document.getElementById('pubBtn').disabled=false;
  }
}

      <div style="font-size:15px;font-weight:500;margin-bottom:8px;text-align:right">رقم الهاتف 📱</div>
      <div class="phone-row">
        <input class="cc-inp" id="ccInp" value="+966" maxlength="5">
        <input class="finp" id="phInp" style="flex:1" placeholder="5XXXXXXXX" type="tel" oninput="this.value=this.value.replace(/\D/g,'')">
      </div>
      <button class="auth-btn" onclick="reqOTP()">إرسال رمز التحقق</button>
    </div>`;
  return`
    <div>
      <div style="font-size:14px;color:var(--sec);text-align:center;margin-top:8px">أُرسل رمز التحقق إلى <b>${authPhone}</b></div>
      <input class="otp-inp" id="otpInp" placeholder="• • • • • •" maxlength="6" oninput="if(this.value.length===6)verOTP()">
      <button class="resend-btn" id="resendBtn" onclick="reqOTP()" disabled>
        ${authResendSecs>0?`إعادة الإرسال بعد ${authResendSecs}s`:'إعادة الإرسال'}
      </button>
      <button class="auth-btn" style="margin-top:0;color:var(--sec);font-size:13px" onclick="authStep='phone';clearTimeout(authResendTimer);renderAuth()">تغيير الرقم</button>
    </div>`;
}
function startResend(sec=60){
  authResendSecs=sec;
  clearInterval(authResendTimer);
  authResendTimer=setInterval(()=>{
    authResendSecs--;
    const b=document.getElementById('resendBtn');
    if(b){b.textContent=authResendSecs>0?`إعادة الإرسال بعد ${authResendSecs}s`:'إعادة الإرسال';b.disabled=authResendSecs>0;}
    if(authResendSecs<=0)clearInterval(authResendTimer);
  },1000);
}
async function reqOTP(){
  const cc=document.getElementById('ccInp')?.value.trim()||'+966';
  const ph=document.getElementById('phInp')?.value.trim()||'';
  if(!ph){toast('أدخل رقم الهاتف');return;}
  authPhone=cc+ph;
  try{
    await api('/auth/request-otp',{method:'POST',body:JSON.stringify({phone:authPhone})});
    authStep='otp';document.getElementById('authStepContent').innerHTML=authHTML();
    startResend();toast('تم إرسال الرمز ✓');
  }catch(e){toast(e.message||'خطأ في الإرسال');}
}
async function verOTP(){
  const code=document.getElementById('otpInp')?.value.trim();
  if(code?.length<6)return;
  try{
    const d=await api('/auth/verify-otp',{method:'POST',body:JSON.stringify({phone:authPhone,code})});
    S.token=d.token;S.user=d.user;
    localStorage.setItem('auth_token',d.token);localStorage.setItem('auth_user',JSON.stringify(d.user));
    S.chWhatsapp=S.user.whatsapp_enabled||false;S.chCall=S.user.call_enabled||false;
    authStep='phone';authPhone='';clearInterval(authResendTimer);
    renderMenu();renderProfile();renderChannels();navigateBottom('home');toast('أهلاً بك ✓');
  }catch(e){toast(e.message||'رمز غير صحيح');}
}

/* ═══════════ PROFILE ═══════════ */
function renderProfile(){
  const el=document.getElementById('profileContent');const u=S.user;
  el.innerHTML=`<div style="padding-bottom:110px">
    <div class="p-avatar">${u?.avatar?`<img src="${u.avatar}" onerror="this.style.display='none'">`:'👤'}</div>
    <div class="pfields">
      <div class="prow"><span style="font-size:18px;width:24px;text-align:center">👤</span>
        <span style="font-size:14px;font-weight:500;flex-shrink:0">الاسم</span>
        <input class="pinp" id="pName" value="${u?.name||''}" placeholder="اسمك">
      </div>
      <div class="prow"><span style="font-size:18px;width:24px;text-align:center">📞</span>
        <span style="font-size:14px;font-weight:500;flex-shrink:0">الهاتف</span>
        <input class="pinp" value="${u?.phone||''}" disabled>
      </div>
    </div>
    <button class="update-btn" onclick="updateProfile()">حفظ التغييرات</button>
    ${u?`
    <button class="signout-btn" onclick="confirmSignOut()">تسجيل الخروج</button>
    <button class="del-btn" onclick="confirmDelAccount()">حذف الحساب</button>`:''}
    <div style="height:20px"></div>
  </div>`;
}
async function updateProfile(){
  const name=document.getElementById('pName')?.value?.trim();if(!name){toast('أدخل الاسم');return;}
  try{const d=await api('/user/profile',{method:'PATCH',body:JSON.stringify({name,whatsapp_enabled:S.chWhatsapp,call_enabled:S.chCall})});
    S.user=d.user;localStorage.setItem('auth_user',JSON.stringify(S.user));
    renderMenu();toast('تم التحديث ✓');}
  catch(e){toast(e.message||'خطأ');}
}
function confirmSignOut(){if(confirm('هل تريد تسجيل الخروج؟'))signOut();}
async function signOut(){
  try{await api('/auth/sign-out',{method:'POST',body:'{}'});}catch(_){}
  S.token=null;S.user=null;S.convs=[];
  localStorage.removeItem('auth_token');localStorage.removeItem('auth_user');
  renderMenu();renderProfile();document.getElementById('backBtn').style.display='none';
  navigateBottom('home');toast('تم تسجيل الخروج');
}
function confirmDelAccount(){if(confirm('سيتم حذف حسابك وجميع بياناتك نهائياً. هل أنت متأكد؟'))delAccount();}
async function delAccount(){
  try{await api('/auth/delete-account',{method:'DELETE'});}catch(e){toast(e.message||'خطأ');return;}
  S.token=null;S.user=null;
  localStorage.removeItem('auth_token');localStorage.removeItem('auth_user');
  renderMenu();renderProfile();document.getElementById('backBtn').style.display='none';
  navigateBottom('home');toast('تم حذف الحساب');
}

/* ═══════════ NOTIFICATIONS ═══════════ */
async function loadNotifs(){
  const el=document.getElementById('notifContent');
  if(!S.token){el.innerHTML=`<div class="empty" style="padding:40px"><span class="empty-icon">🔔</span><p>سجّل دخولك لعرض الإشعارات</p></div>`;return;}
  el.innerHTML=`<div class="spin-wrap"><div class="spin"></div></div>`;
  try{
    const d=await api('/notifications');S.notifs=d.data||[];
    const unread=S.notifs.filter(n=>!n.is_read).length;
    let h=`<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--tint);font-size:17px;font-weight:700">
      <span></span><span>الإشعارات</span>
      ${unread>0?`<button onclick="markAllRead()" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:var(--font)">قراءة الكل ✓</button>`:'<span></span>'}
    </div>`;
    if(!S.notifs.length){h+=`<div class="empty" style="padding:40px"><span class="empty-icon">🔔</span><p>لا توجد إشعارات</p></div>`;}
    else{S.notifs.forEach(n=>{
      h+=`<div class="notif-row" style="background:${n.is_read?'var(--card)':'rgba(245,197,24,.12)'}">
        <div class="ndot" style="background:${n.is_read?'transparent':'var(--accent)'}"></div>
        <div class="notif-body">
          ${n.title_ar?`<div style="font-size:14px;font-weight:600;margin-bottom:4px">${n.title_ar}</div>`:''}
          ${n.body_ar?`<div style="font-size:13px;color:var(--sec);margin-bottom:4px">${n.body_ar}</div>`:''}
          <div style="font-size:11px;color:var(--inactive)">${ago(n.created_at)}</div>
        </div></div>`;
    });}
    el.innerHTML=h;
  }catch(e){el.innerHTML=`<div class="empty"><span class="empty-icon">⚠️</span><p>خطأ في التحميل</p></div>`;}
}
async function markAllRead(){
  try{await api('/notifications/mark-all-read',{method:'POST',body:'{}'});loadNotifs();}catch(_){}
}

/* ═══════════ MY ADS ═══════════ */
async function loadMyAds(){
  const el=document.getElementById('myAdsContent');
  if(!S.token){el.innerHTML=`<div class="empty"><span class="empty-icon">📋</span><p>سجّل دخولك أولاً</p></div>`;return;}
  el.innerHTML=`<div class="spin-wrap"><div class="spin"></div></div>`;
  try{
    const d=await api('/listings?page=1');S.myAds=d.data||[];el.innerHTML='';
    if(!S.myAds.length){el.innerHTML=`<div class="empty"><span class="empty-icon">📭</span><p>لا توجد إعلانات</p></div>`;return;}
    S.myAds.forEach(l=>el.appendChild(buildCard(l,S.myAds)));
  }catch(e){el.innerHTML=`<div class="empty"><span class="empty-icon">⚠️</span><p>تعذّر التحميل</p></div>`;}
}

/* ═══════════ SETTINGS ═══════════ */
function renderSettings(){
  const el=document.getElementById('settingsContent');
  el.innerHTML=`<div style="padding-bottom:110px">
    <div class="srow-style">
      <div class="srow" onclick="navMenu('language')">
        <div class="sibox">🌐</div><span class="srow-label">اللغة</span><span style="color:var(--sec);font-size:14px">‹</span>
      </div>
    </div>
    <div class="srow-style">
      <div class="srow" onclick="navMenu('channels')">
        <div class="sibox">📞</div><span class="srow-label">قنوات التواصل</span><span style="color:var(--sec);font-size:14px">‹</span>
      </div>
    </div>
    <div class="srow-style">
      <div class="toggle-row">
        <div class="sibox">🌙</div>
        <span style="font-size:16px;font-weight:500;flex:1">الوضع الداكن</span>

          <input type="checkbox" ${S.isDark?'checked':''} onchange="toggleTheme()">
          <span class="ios-slider"></span>

      <button class="del-account-btn" onclick="confirmDelAccount()">حذف الحساب</button>

/* ═══════════ LANGUAGE ═══════════ */
function renderLang(){
  const el=document.getElementById('langContent');
  el.innerHTML=`<div style="background:var(--card);border-radius:14px;padding:16px;box-shadow:0 2px 8px var(--shad)">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="sibox">🌐</div>
      <span style="font-size:16px;font-weight:500">اختر اللغة:</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="lang-btn ${S.lang==='ar'?'active':''}" onclick="setLang('ar')">العربية</button>
      <button class="lang-btn ${S.lang==='en'?'active':''}" onclick="setLang('en')">English</button>
    </div>
  </div>`;
}
function setLang(l){S.lang=l;localStorage.setItem('lang',l);renderLang();toast(l==='ar'?'تم اختيار العربية':'English selected');}

/* ═══════════ CONTACT CHANNELS ═══════════ */
function renderChannels(){
  const el=document.getElementById('channelsContent');
  el.innerHTML=`<div style="background:var(--card);border-radius:14px;box-shadow:0 2px 8px var(--shad);overflow:hidden">
    <div style="display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid var(--bdr)">
      <div class="sibox">📞</div>
      <span style="font-size:16px;font-weight:500">قنوات التواصل</span>
    </div>
    <!-- Chat: always on -->
    <div class="ch-row">
      <div class="checkbox locked" style="background:var(--tint)">✓</div>
      <span style="flex:1;font-size:16px;font-weight:500;text-align:right">المحادثة</span>
      <span style="font-size:22px">💬</span>
    </div>
    <!-- WhatsApp -->
    <div class="ch-row">
      <div class="checkbox ${S.chWhatsapp?'active':''}" id="chkWA" onclick="toggleChannel('whatsapp')" style="${S.chWhatsapp?'background:var(--tint)':''}">
        ${S.chWhatsapp?'✓':''}
      </div>
      <span style="flex:1;font-size:16px;font-weight:500;text-align:right">واتساب</span>
      <span style="font-size:22px">💬</span>
    </div>
    <!-- Call -->
    <div class="ch-row">
      <div class="checkbox ${S.chCall?'active':''}" id="chkCall" onclick="toggleChannel('call')" style="${S.chCall?'background:var(--tint)':''}">
        ${S.chCall?'✓':''}
      </div>
      <span style="flex:1;font-size:16px;font-weight:500;text-align:right">اتصال هاتفي</span>
      <span style="font-size:22px">📞</span>
    </div>
  </div>`;
}
async function toggleChannel(ch){
  if(ch==='whatsapp')S.chWhatsapp=!S.chWhatsapp;
  else S.chCall=!S.chCall;
  renderChannels();
  if(!S.user||!S.token)return;
  try{
    const d=await api('/user/profile',{method:'PATCH',body:JSON.stringify({name:S.user.name||'',whatsapp_enabled:S.chWhatsapp,call_enabled:S.chCall})});
    S.user=d.user;localStorage.setItem('auth_user',JSON.stringify(S.user));toast('تم الحفظ ✓');
  }catch(e){toast(e.message||'خطأ');}
}

/* ═══════════ UTILS ═══════════ */
function fmt(v){if(v==null)return'–';return new Intl.NumberFormat('ar-SA').format(Math.floor(v));}
function ago(iso){if(!iso)return'الآن';const s=Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60)return'الآن';if(s<3600)return Math.floor(s/60)+' دقيقة';
  if(s<86400)return Math.floor(s/3600)+' ساعة';return Math.floor(s/86400)+' يوم';}
function relDay(iso){if(!iso)return'';const d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/86400000);
  if(diff===0)return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
  if(diff===1)return'أمس';
  return['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'][d.getDay()];}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);}
function toggleTheme(){S.isDark=!S.isDark;document.documentElement.setAttribute('data-theme',S.isDark?'dark':'');localStorage.setItem('theme',S.isDark?'dark':'light');document.getElementById('themeBtn').textContent=S.isDark?'☀️ فاتح':'🌙 داكن';renderSettings();}

/* ═══════════ INIT ═══════════ */
S.lang=localStorage.getItem('lang')||'ar';
boot();
</script>
